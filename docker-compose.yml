version: "3.8"

services:
  book-seeker:
    build: .
    container_name: book-seeker
    ports:
      - "8091:8091"
    volumes:
      - ./data:/app/data
      - audiobooks:/audiobooks
      - ebooks:/ebooks
    environment:
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - QBIT_URL=http://qbittorrent:8081
      - ABS_URL=http://audiobookshelf:80
      - ABS_USER=${ABS_USER:-admin}
      - ABS_PASS=${ABS_PASS:-admin}
      - CALIBRE_URL=http://calibre-web:8083
      - EBOOK_DIR=/ebooks
    networks:
      - default

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "13378:80"
    volumes:
      - audiobooks:/audiobooks
      - abs-config:/config
      - abs-metadata:/metadata
    networks:
      - default

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
    volumes:
      - calibre-config:/config
      - ebooks:/books
    ports:
      - "8083:8083"
    restart: unless-stopped
    networks:
      - default

volumes:
  audiobooks:
  ebooks:
  abs-config:
  abs-metadata:
  calibre-config:
