<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookSeeker</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>

<nav>
  <div class="logo">BookSeeker</div>
  <div class="nav-links" id="navLinks" style="display:none">
    <button data-page="search" class="active">Search</button>
    <button data-page="library">Library</button>
    <button data-page="ebooks">Ebooks</button>
    <button data-page="downloads">Downloads</button>
    <button data-page="player">Player</button>
    <button data-page="reader">Reader</button>
    <button data-page="settings">Settings</button>
  </div>
</nav>

<main>
  <!-- Login -->
  <div class="page active" id="pageLogin">
    <div class="login-wrap">
      <div class="login-box">
        <h2>BookSeeker</h2>
        <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
        <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
        <button id="loginBtn">Login</button>
        <div class="login-error" id="loginError"></div>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="page" id="pageSearch">
    <div class="type-toggle">
      <button class="type-btn active" data-type="audiobook">Audiobooks</button>
      <button class="type-btn" data-type="ebook">Ebooks</button>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search audiobooks on torrent trackers...">
      <button id="searchBtn">Search</button>
    </div>
    <div id="searchResults"></div>
  </div>

  <!-- Library -->
  <div class="page" id="pageLibrary">
    <h1 class="page-title">Library</h1>
    <div class="search-bar" style="margin-bottom:16px">
      <input type="text" id="libSearchInput" placeholder="Search your library...">
      <button id="libSearchBtn">Search</button>
    </div>
    <div id="libraryContent"></div>
  </div>

  <!-- Ebooks -->
  <div class="page" id="pageEbooks">
    <h1 class="page-title">Ebooks</h1>
    <div id="ebookBreadcrumb" class="ebook-breadcrumb"></div>
    <div id="ebookContent"></div>
  </div>

  <!-- Downloads -->
  <div class="page" id="pageDownloads">
    <h1 class="page-title">Downloads</h1>
    <div id="downloadsContent"></div>
  </div>

  <!-- Player (Audiobookshelf) -->
  <div class="page iframe-page" id="pagePlayer">
    <iframe id="absFrame" src="about:blank" allow="autoplay"></iframe>
  </div>

  <!-- Reader (Calibre-Web) -->
  <div class="page iframe-page" id="pageReader">
    <iframe id="calibreFrame" src="about:blank"></iframe>
  </div>

  <!-- Settings -->
  <div class="page" id="pageSettings">
    <h1 class="page-title">Settings</h1>

    <!-- Change Password (all users) -->
    <div class="settings-section">
      <div class="section-header" data-toggle="passwordSection">Change Password</div>
      <div class="section-body" id="passwordSection">
        <div class="setting-group">
          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="Min 8 characters" class="setting-input">
        </div>
        <div class="setting-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm password" class="setting-input">
        </div>
        <button class="btn btn-primary" id="changePassBtn">Change Password</button>
      </div>
    </div>

    <!-- Service Configuration (admin only) -->
    <div class="settings-section admin-only" id="svcConfigSection">
      <div class="section-header" data-toggle="svcConfigBody">Service Configuration</div>
      <div class="section-body" id="svcConfigBody" style="display:none">
        <h3 class="subsection-title">Prowlarr</h3>
        <div class="setting-group">
          <label>URL</label>
          <input type="text" id="setProwlarrUrl" class="setting-input" placeholder="http://prowlarr:9696">
        </div>
        <div class="setting-group">
          <label>API Key</label>
          <input type="password" id="setProwlarrKey" class="setting-input" placeholder="API key">
        </div>

        <h3 class="subsection-title">qBittorrent</h3>
        <div class="setting-group">
          <label>URL</label>
          <input type="text" id="setQbitUrl" class="setting-input" placeholder="http://qbittorrent:8081">
        </div>
        <div class="setting-group">
          <label>Username</label>
          <input type="text" id="setQbitUser" class="setting-input" placeholder="admin">
        </div>
        <div class="setting-group">
          <label>Password</label>
          <input type="password" id="setQbitPass" class="setting-input" placeholder="Password">
        </div>
        <div class="setting-group">
          <label>Audiobook Save Path (qBit perspective)</label>
          <input type="text" id="setQbitSavePath" class="setting-input" placeholder="/data/audiobooks">
        </div>
        <div class="setting-group">
          <label>Ebook Save Path (qBit perspective)</label>
          <input type="text" id="setQbitEbookSavePath" class="setting-input" placeholder="/data/ebooks">
        </div>

        <h3 class="subsection-title">Audiobookshelf</h3>
        <div class="setting-group">
          <label>URL</label>
          <input type="text" id="setAbsUrl" class="setting-input" placeholder="http://audiobookshelf:80">
        </div>
        <div class="setting-group">
          <label>Username</label>
          <input type="text" id="setAbsUser" class="setting-input" placeholder="admin">
        </div>
        <div class="setting-group">
          <label>Password</label>
          <input type="password" id="setAbsPass" class="setting-input" placeholder="Password">
        </div>

        <h3 class="subsection-title">Directories</h3>
        <div class="setting-group">
          <label>Audiobook Directory</label>
          <input type="text" id="setAudiobookDir" class="setting-input" placeholder="/audiobooks">
        </div>
        <div class="setting-group">
          <label>Ebook Directory</label>
          <input type="text" id="setEbookDir" class="setting-input" placeholder="/ebooks">
        </div>

        <h3 class="subsection-title">Calibre-Web</h3>
        <div class="setting-group">
          <label>URL</label>
          <input type="text" id="setCalibreUrl" class="setting-input" placeholder="http://calibre-web:8083">
        </div>

        <button class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
        <span id="settingsSaveStatus" class="save-status"></span>
      </div>
    </div>

    <!-- User Management (admin only) -->
    <div class="settings-section admin-only" id="userMgmtSection">
      <div class="section-header" data-toggle="userMgmtBody">User Management</div>
      <div class="section-body" id="userMgmtBody" style="display:none">
        <div id="usersList"></div>
        <h3 class="subsection-title" style="margin-top:16px">Add User</h3>
        <div class="add-user-form">
          <input type="text" id="newUsername" placeholder="Username" class="setting-input">
          <input type="password" id="newUserPass" placeholder="Password (min 8)" class="setting-input">
          <label class="checkbox-label">
            <input type="checkbox" id="newUserAdmin"> Admin
          </label>
          <button class="btn btn-primary" id="addUserBtn">Add User</button>
        </div>
      </div>
    </div>

    <!-- Disk Usage (admin only) -->
    <div class="settings-section admin-only" id="diskUsageSection">
      <div class="section-header" data-toggle="diskUsageBody">Disk Usage</div>
      <div class="section-body" id="diskUsageBody" style="display:none">
        <div id="diskUsageContent"></div>
      </div>
    </div>

    <div class="settings-version" id="appVersion"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
